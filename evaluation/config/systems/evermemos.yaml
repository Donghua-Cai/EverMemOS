# EverMemOS System Configuration

name: "evermemos"
version: "1.0"
description: "EverMemOS"

adapter: "evermemos"

# LLM configuration
llm:
  provider: "openai"
  model: "${LLM_MODEL:gpt-4.1-mini}"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://api.openai.com/v1}"

# Optional: dedicated LLM for answer stage (Stage 3).
# If not set, adapter falls back to `llm` settings.
llm_answer:
  provider: "openai"
  model: "${LLM_ANSWER_MODEL:gpt-5-mini}"
  api_key: "${LLM_ANSWER_API_KEY}"
  base_url: "${LLM_ANSWER_BASE_URL:https://api.openai.com/v1}"

search:
  mode: "agentic"  # agentic | lightweight
  # When mode="lightweight", the search method defaults to "bm25_only".
  # Uncomment and set the following to override:
  # lightweight_search_mode: "hybrid"   # BM25 + Embedding + RRF fusion
  # lightweight_search_mode: "emb_only" # Only Embedding search
